services:
  converter-api:
    build:
      context: .
      dockerfile: src/DocumentConverter.Api/Dockerfile
    image: converter-api:latest
    container_name: converter-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_HTTP_PORTS: "8080"
      TZ: "${TZ:-Europe/Istanbul}"
      Converter__InputRoot: "/app/data/input"
      Converter__OutputRoot: "/app/data/output"
      Converter__ProcessedRoot: "/app/data/processed"
      Converter__FailedRoot: "/app/data/failed"
      Converter__TempRoot: "/app/data/temp"
      Converter__JobsRoot: "/app/data/jobs"
      Converter__MaxUploadBytes: "${CONVERTER_MAX_UPLOAD_BYTES:-52428800}"
      Mongo__ConnectionString: "${MONGO_CONNECTION_STRING:-mongodb://host.docker.internal:27017}"
      Mongo__DatabaseName: "${MONGO_DATABASE_NAME:-document_converter}"
      Mongo__ConversionJobsCollectionName: "${MONGO_CONVERSION_JOBS_COLLECTION_NAME:-conversionJobs}"
    volumes:
      - "./data:/app/data"
    ports:
      - "${API_PORT:-8088}:8080"
    mem_limit: 512m
    cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  converter-worker:
    build:
      context: .
      dockerfile: src/DocumentConverter.Worker/Dockerfile
    image: converter-worker:latest
    container_name: converter-worker
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: "Production"
      TZ: "${TZ:-Europe/Istanbul}"
      Converter__InputRoot: "/app/data/input"
      Converter__OutputRoot: "/app/data/output"
      Converter__ProcessedRoot: "/app/data/processed"
      Converter__FailedRoot: "/app/data/failed"
      Converter__TempRoot: "/app/data/temp"
      Converter__JobsRoot: "/app/data/jobs"
      Converter__LibreOfficePath: "soffice"
      Converter__ConversionTimeoutSeconds: "${CONVERTER_CONVERSION_TIMEOUT_SECONDS:-120}"
      Converter__PollingIntervalSeconds: "${CONVERTER_POLLING_INTERVAL_SECONDS:-30}"
      Converter__WorkerId: "${CONVERTER_WORKER_ID:-converter-worker-1}"
      Converter__JobLockSeconds: "${CONVERTER_JOB_LOCK_SECONDS:-300}"
      Mongo__ConnectionString: "${MONGO_CONNECTION_STRING:-mongodb://host.docker.internal:27017}"
      Mongo__DatabaseName: "${MONGO_DATABASE_NAME:-document_converter}"
      Mongo__ConversionJobsCollectionName: "${MONGO_CONVERSION_JOBS_COLLECTION_NAME:-conversionJobs}"
    volumes:
      - "./data:/app/data"
    mem_limit: 2g
    cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/data/temp/worker-heartbeat.txt && find /app/data/temp/worker-heartbeat.txt -mmin -10 | grep -q ."]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
